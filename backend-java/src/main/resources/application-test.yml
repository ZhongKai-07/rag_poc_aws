spring:
  datasource:
    url: jdbc:h2:mem:ragtest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  ai:
    bedrock:
      aws:
        region: ap-northeast-1

server:
  port: 8001
