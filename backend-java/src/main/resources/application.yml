spring:
  application:
    name: rag-backend-java
  profiles:
    default: local
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  jpa:
    open-in-view: false

huatai:
  aws:
    region: ${AWS_DEFAULT_REGION:us-east-1}
    bedrock-region: ${BEDROCK_REGION:us-west-2}
    bda-region: ${BDA_REGION:${AWS_DEFAULT_REGION:us-east-1}}
    bda-project-arn: ${BDA_PROJECT_ARN:}
    bda-profile-arn: ${BDA_PROFILE_ARN:}
    bda-stage: ${BDA_STAGE:LIVE}
    bda-max-poll-attempts: ${BDA_MAX_POLL_ATTEMPTS:60}
    bda-poll-interval: ${BDA_POLL_INTERVAL:2s}
  opensearch:
    endpoint: ${OPENSEARCH_ENDPOINT:https://localhost:9200}
    username: ${OPENSEARCH_USERNAME:admin}
    password: ${OPENSEARCH_PASSWORD:admin}
    connect-timeout: 5s
    socket-timeout: 30s
  storage:
    document-root: ${DOCUMENT_ROOT:./documents}
    document-bucket: ${S3_DOCUMENT_BUCKET:}
    document-prefix: ${S3_DOCUMENT_PREFIX:}
    bda-output-prefix: ${S3_BDA_OUTPUT_PREFIX:_bda_output}
  rag:
    vec-score-threshold: ${RAG_VEC_SCORE_THRESHOLD:0.0}
    text-score-threshold: ${RAG_TEXT_SCORE_THRESHOLD:0.0}
    rerank-score-threshold: ${RAG_RERANK_SCORE_THRESHOLD:0.01}
    request-timeout: ${RAG_REQUEST_TIMEOUT:30s} 
    retry-max-attempts: ${RAG_RETRY_MAX_ATTEMPTS:3}
    retry-backoff: ${RAG_RETRY_BACKOFF:1s}
    embedding-model-id: ${RAG_EMBEDDING_MODEL_ID:amazon.titan-embed-text-v1}
    rerank-model-id: ${RAG_RERANK_MODEL_ID:cohere.rerank-v3-5:0}
    answer-model-id: ${RAG_ANSWER_MODEL_ID:qwen.qwen3-235b-a22b-2507-v1:0}
    query-rewrite-enabled: ${RAG_QUERY_REWRITE_ENABLED:true}
    citation-enabled: ${RAG_CITATION_ENABLED:true}
    # rewrite-model-id: ${RAG_REWRITE_MODEL_ID:anthropic.claude-3-haiku-20240307-v1:0}
    rewrite-model-id: ${RAG_REWRITE_MODEL_ID:qwen.qwen3-235b-a22b-2507-v1:0}

  conversation:
    window-size: ${CONVERSATION_WINDOW_SIZE:10}
    keep-recent: ${CONVERSATION_KEEP_RECENT:6}
  streaming:
    core-pool-size: ${STREAMING_CORE_POOL:4}
    max-pool-size: ${STREAMING_MAX_POOL:8}
    queue-capacity: ${STREAMING_QUEUE:50}
    timeout: ${STREAMING_TIMEOUT:60s}

server:
  port: 8001
