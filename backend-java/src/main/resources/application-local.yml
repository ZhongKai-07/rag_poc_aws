spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:rag}
    username: ${DB_USERNAME:rag}
    password: ${DB_PASSWORD:rag}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  ai:
    bedrock:
      aws:
        region: ${BEDROCK_REGION:${AWS_DEFAULT_REGION:ap-northeast-1}}

server:
  port: 8001
